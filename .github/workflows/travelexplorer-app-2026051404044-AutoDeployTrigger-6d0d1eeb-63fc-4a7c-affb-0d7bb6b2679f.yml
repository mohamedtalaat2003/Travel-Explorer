name: Trigger auto deployment for travelexplorer-app-2026051404044

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/travelexplorer-app-2026051404044-AutoDeployTrigger-6d0d1eeb-63fc-4a7c-affb-0d7bb6b2679f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TRAVELEXPLORERAPP2026051404044_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TRAVELEXPLORERAPP2026051404044_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TRAVELEXPLORERAPP2026051404044_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: carpriceacr2003.azurecr.io
          registryUsername: ${{ secrets.TRAVELEXPLORERAPP2026051404044_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TRAVELEXPLORERAPP2026051404044_REGISTRY_PASSWORD }}
          containerAppName: travelexplorer-app-2026051404044
          resourceGroup: CarPrice_RG
          imageToBuild: carpriceacr2003.azurecr.io/travelexplorer-app-2026051404044:${{ github.sha }}


